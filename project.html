              <circle class="project-nav-progress__track" cx="12" cy="12" r="9"></circle>
              <circle class="project-nav-progress__value" cx="12" cy="12" r="9"></circle>
            </svg>
            <svg class="project-nav-action__check" viewBox="0 0 24 24" aria-hidden="true">

        <div class="project-hero__intro">
          <h1 class="project-lede" data-project-title>Project title</h1>
          <dl class="project-facts">
            <div>
              <dt>Company</dt>
              <dd data-project-company></dd>
            </div>
            <div>
              <dt>Role</dt>
              <dd data-project-role></dd>
            </div>
            <div>
              <dt>Year</dt>
              <dd data-project-year></dd>
            </div>
          </dl>
        </div>
        <div class="project-cover" aria-hidden="true">
          <span>Project media</span>
        </div>
      </section>

      <section class="project-section" id="challenge" data-section-label="Challenge">
        <h2>Challenge</h2>
        <p data-project-challenge></p>
      </section>

      <section class="project-section" id="contribution" data-section-label="Contribution">
        <h2>Contribution</h2>
        <p data-project-contribution></p>
      </section>

      <div class="project-media-row" aria-hidden="true">
        <div><span>Process media</span></div>
        <div><span>Detail media</span></div>
      </div>

      <section class="project-section project-section--outcome" id="outcome" data-section-label="Outcome">
        <h2>Outcome</h2>
        <p data-project-outcome></p>
      </section>

        <a class="project-link project-pager__link project-pager__link--next" data-project-next href="./project.html">
          <span class="project-pager__label">Next</span>
          <span class="project-pager__thumb" data-project-next-thumb aria-hidden="true"></span>
          <span class="project-pager__title" data-project-next-title></span>
        </a>
      </nav>

  <footer class="footer">
    <p>© 2026 Andy Cabindol</p>
  </footer>

  <div class="page-transition" id="page-transition" aria-hidden="true"></div>
  <div class="toast" id="toast" role="status" aria-live="polite" data-liquid-ignore></div>
  <div class="cursor-bubble" id="cursor-bubble" aria-hidden="true" hidden data-liquid-ignore>
    <div class="cursor-bubble__ring"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lenis@1.3.1/dist/lenis.min.js" defer></script>
